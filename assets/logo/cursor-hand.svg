<svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 10 12" shape-rendering="crispEdges">
  <!-- Pixel art hand cursor — Windows 3.1 style, white with black outline -->
  <!-- Each rect = 1 pixel unit -->

  <!-- Black outline / shadow pixels -->
  <rect x="2" y="0" width="1" height="1" fill="#000"/>
  <rect x="3" y="0" width="1" height="1" fill="#000"/>
  <rect x="1" y="1" width="1" height="1" fill="#000"/>
  <rect x="4" y="1" width="1" height="1" fill="#000"/>
  <rect x="1" y="2" width="1" height="1" fill="#000"/>
  <rect x="4" y="2" width="1" height="1" fill="#000"/>
  <rect x="1" y="3" width="1" height="1" fill="#000"/>
  <rect x="4" y="3" width="1" height="1" fill="#000"/>
  <rect x="4" y="4" width="1" height="1" fill="#000"/>
  <rect x="6" y="4" width="1" height="1" fill="#000"/>
  <rect x="8" y="4" width="1" height="1" fill="#000"/>
  <rect x="0" y="5" width="1" height="1" fill="#000"/>
  <rect x="5" y="5" width="1" height="1" fill="#000"/>
  <rect x="7" y="5" width="1" height="1" fill="#000"/>
  <rect x="9" y="5" width="1" height="1" fill="#000"/>
  <rect x="0" y="6" width="1" height="1" fill="#000"/>
  <rect x="9" y="6" width="1" height="1" fill="#000"/>
  <rect x="0" y="7" width="1" height="1" fill="#000"/>
  <rect x="9" y="7" width="1" height="1" fill="#000"/>
  <rect x="0" y="8" width="1" height="1" fill="#000"/>
  <rect x="9" y="8" width="1" height="1" fill="#000"/>
  <rect x="1" y="9" width="1" height="1" fill="#000"/>
  <rect x="9" y="9" width="1" height="1" fill="#000"/>
  <rect x="2" y="10" width="1" height="1" fill="#000"/>
  <rect x="9" y="10" width="1" height="1" fill="#000"/>
  <rect x="3" y="11" width="1" height="1" fill="#000"/>
  <rect x="8" y="11" width="1" height="1" fill="#000"/>
  <rect x="4" y="12" width="1" height="1" fill="#000"/>
  <rect x="5" y="12" width="1" height="1" fill="#000"/>
  <rect x="6" y="12" width="1" height="1" fill="#000"/>
  <rect x="7" y="12" width="1" height="1" fill="#000"/>

  <!-- White fill — dedo indicador -->
  <rect x="2" y="1" width="1" height="1" fill="#fff"/>
  <rect x="3" y="1" width="1" height="1" fill="#fff"/>
  <rect x="2" y="2" width="1" height="1" fill="#fff"/>
  <rect x="3" y="2" width="1" height="1" fill="#fff"/>
  <rect x="2" y="3" width="1" height="1" fill="#fff"/>
  <rect x="3" y="3" width="1" height="1" fill="#fff"/>

  <!-- White fill — palma + outros dedos -->
  <rect x="1" y="4" width="3" height="1" fill="#fff"/>
  <rect x="5" y="4" width="1" height="1" fill="#fff"/>
  <rect x="7" y="4" width="1" height="1" fill="#fff"/>
  <rect x="1" y="5" width="4" height="1" fill="#fff"/>
  <rect x="6" y="5" width="1" height="1" fill="#fff"/>
  <rect x="8" y="5" width="1" height="1" fill="#fff"/>
  <rect x="1" y="6" width="8" height="1" fill="#fff"/>
  <rect x="1" y="7" width="8" height="1" fill="#fff"/>
  <rect x="1" y="8" width="8" height="1" fill="#fff"/>
  <rect x="2" y="9" width="7" height="1" fill="#fff"/>
  <rect x="3" y="10" width="6" height="1" fill="#fff"/>
  <rect x="4" y="11" width="4" height="1" fill="#fff"/>
</svg>
